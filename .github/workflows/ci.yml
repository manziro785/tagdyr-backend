name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tagdyr
          POSTGRES_PASSWORD: tagdyr
          POSTGRES_DB: tagdyr_test
        ports:
          - 5432:5432
        # ждём, пока БД будет готова принимать соединения
        options: >-
          --health-cmd "pg_isready -U tagdyr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://tagdyr:tagdyr@localhost:5432/tagdyr_test
      TEST_DATABASE_URL: postgres://tagdyr:tagdyr@localhost:5432/tagdyr_test
      JWT_ACCESS_SECRET: ci_access_secret_at_least_16_chars_long
      JWT_REFRESH_SECRET: ci_refresh_secret_at_least_16_chars_long

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.6.0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck & build (project references)
        run: pnpm build

      - name: Apply DB migrations
        run: pnpm db:migrate

      - name: Run tests (unit + integration)
        run: pnpm test
